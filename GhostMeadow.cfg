\* GhostMeadow.cfg — TLC model checker configuration
\*
\* Small model for tractable checking:
\*   3 nodes, 8 bit positions
\*   Thresholds: yellow=2, orange=4, red=6 (out of 8)
\*
\* Run: tlc GhostMeadow.tla -config GhostMeadow.cfg

CONSTANTS
    NUM_NODES = 3
    M = 8
    QUORUM_K = 2
    SAT_YELLOW = 2
    SAT_ORANGE = 4
    SAT_RED = 6

SPECIFICATION Spec

INVARIANTS
    TypeOK
    ORMonotonicity
    Commutativity
    Idempotency
    QuorumGuard

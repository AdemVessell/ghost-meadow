<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost Meadow — Swarm Convergence</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #c8c8d0;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }
  canvas { display: block; position: absolute; top: 0; left: 0; }
  #ui {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }
  #title {
    position: absolute; top: 24px; left: 0; width: 100%; text-align: center;
    font-size: 28px; letter-spacing: 6px; color: #e0e0f0;
    text-shadow: 0 0 30px rgba(120, 140, 255, 0.4);
    opacity: 0; animation: fadeIn 2s 0.5s forwards;
  }
  #subtitle {
    position: absolute; top: 62px; left: 0; width: 100%; text-align: center;
    font-size: 13px; letter-spacing: 3px; color: #6a6a8a;
    opacity: 0; animation: fadeIn 2s 1.5s forwards;
  }
  #stats {
    position: absolute; bottom: 24px; left: 24px;
    font-size: 12px; line-height: 1.8; color: #5a5a7a;
    opacity: 0; animation: fadeIn 2s 2s forwards;
  }
  #stats .val { color: #8888cc; }
  #legend {
    position: absolute; bottom: 24px; right: 24px;
    font-size: 11px; line-height: 2; color: #5a5a7a; text-align: right;
    opacity: 0; animation: fadeIn 2s 2s forwards;
  }
  #legend .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 6px; vertical-align: middle;
  }
  #event-log {
    position: absolute; top: 90px; right: 24px; width: 280px;
    font-size: 11px; line-height: 1.6; color: #5a5a7a;
    opacity: 0; animation: fadeIn 2s 2.5s forwards;
    max-height: 60vh; overflow: hidden;
  }
  #event-log .entry {
    opacity: 0; animation: logFade 4s forwards;
    margin-bottom: 2px;
  }
  #epoch-flash {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: white; opacity: 0; pointer-events: none;
    z-index: 5;
  }
  #phase-label {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 18px; letter-spacing: 8px; color: #ffffff;
    text-shadow: 0 0 40px rgba(120, 140, 255, 0.8);
    opacity: 0; z-index: 15; pointer-events: none;
  }
  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes logFade { 0% { opacity: 0; } 10% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <div id="title">GHOST MEADOW</div>
  <div id="subtitle">PROBABILISTIC SWARM CONVERGENCE</div>
  <div id="stats">
    <div>EPOCH <span class="val" id="s-epoch">0</span></div>
    <div>STEP <span class="val" id="s-step">0</span></div>
    <div>NODES <span class="val" id="s-nodes">8</span></div>
    <div>MERGES <span class="val" id="s-merges">0</span></div>
    <div>VARIANCE <span class="val" id="s-var">0.000000</span></div>
    <div>AVG SAT <span class="val" id="s-sat">0.00%</span></div>
  </div>
  <div id="legend">
    <div><span class="dot" style="background:#4a9"></span>NOMINAL</div>
    <div><span class="dot" style="background:#cc4"></span>YELLOW</div>
    <div><span class="dot" style="background:#e83"></span>ORANGE</div>
    <div><span class="dot" style="background:#e33"></span>RED</div>
  </div>
  <div id="event-log"></div>
  <div id="epoch-flash"></div>
  <div id="phase-label"></div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// --- Bloom filter simulation ---
const NUM_NODES = 8;
const BITS = 256; // visual bit array size
const CONTACT_RANGE = 3;
const ZONE_COLORS = ['#4a9', '#cc4', '#e83', '#e33'];
const ZONE_NAMES = ['NOMINAL', 'YELLOW', 'ORANGE', 'RED'];
const ZONE_THRESHOLDS = [0.15, 0.35, 0.60, 0.80];

class Node {
  constructor(id, x, y) {
    this.id = id;
    this.x = x;
    this.y = y;
    this.targetX = x;
    this.targetY = y;
    this.bits = new Uint8Array(BITS);
    this.saturation = 0;
    this.zone = 0;
    this.mergeCount = 0;
    this.sources = new Set();
    this.radius = 28;
    this.pulseRadius = 0;
    this.pulseAlpha = 0;
    this.glowIntensity = 0;
    this.angle = Math.random() * Math.PI * 2;
    this.orbitSpeed = 0.0003 + Math.random() * 0.0004;
    this.orbitRadius = 8 + Math.random() * 12;
    this.baseX = x;
    this.baseY = y;
  }

  seed(count) {
    for (let i = 0; i < count; i++) {
      const bit = Math.floor(Math.random() * BITS);
      this.bits[bit] = 1;
    }
    this.updateSaturation();
  }

  merge(other) {
    let delta = 0;
    for (let i = 0; i < BITS; i++) {
      if (other.bits[i] && !this.bits[i]) {
        this.bits[i] = 1;
        delta++;
      }
    }
    if (delta > 0) {
      this.mergeCount++;
      this.sources.add(other.id);
      this.updateSaturation();
    }
    return delta;
  }

  decay() {
    this.bits.fill(0);
    this.saturation = 0;
    this.zone = 0;
    this.sources.clear();
  }

  updateSaturation() {
    let set = 0;
    for (let i = 0; i < BITS; i++) if (this.bits[i]) set++;
    this.saturation = set / BITS;
    if (this.saturation >= ZONE_THRESHOLDS[3]) this.zone = 3;
    else if (this.saturation >= ZONE_THRESHOLDS[2]) this.zone = 2;
    else if (this.saturation >= ZONE_THRESHOLDS[1]) this.zone = 1;
    else this.zone = 0;
  }

  update() {
    this.angle += this.orbitSpeed;
    this.targetX = this.baseX + Math.cos(this.angle) * this.orbitRadius;
    this.targetY = this.baseY + Math.sin(this.angle * 0.7) * this.orbitRadius;
    this.x += (this.targetX - this.x) * 0.05;
    this.y += (this.targetY - this.y) * 0.05;
    this.pulseAlpha *= 0.96;
    this.pulseRadius += (0 - this.pulseRadius) * 0.02;
    this.glowIntensity *= 0.97;
  }

  triggerPulse() {
    this.pulseRadius = this.radius;
    this.pulseAlpha = 1;
    this.glowIntensity = 1;
  }
}

// Place nodes in a loose circle
const nodes = [];
const cx = W / 2, cy = H / 2;
const layoutRadius = Math.min(W, H) * 0.28;
for (let i = 0; i < NUM_NODES; i++) {
  const a = (i / NUM_NODES) * Math.PI * 2 - Math.PI / 2;
  const nx = cx + Math.cos(a) * layoutRadius;
  const ny = cy + Math.sin(a) * layoutRadius;
  nodes.push(new Node(i, nx, ny));
}

// Merge beam particles
const beams = [];
class Beam {
  constructor(from, to) {
    this.from = from;
    this.to = to;
    this.progress = 0;
    this.speed = 0.015 + Math.random() * 0.01;
    this.alive = true;
    this.particles = [];
    for (let i = 0; i < 6; i++) {
      this.particles.push({
        offset: Math.random() * 0.3,
        perpOffset: (Math.random() - 0.5) * 12,
        size: 1 + Math.random() * 2,
        alpha: 0.5 + Math.random() * 0.5
      });
    }
  }
  update() {
    this.progress += this.speed;
    if (this.progress > 1.3) this.alive = false;
  }
}

// Background star field
const stars = [];
for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    size: Math.random() * 1.5,
    twinkle: Math.random() * Math.PI * 2,
    speed: 0.01 + Math.random() * 0.03
  });
}

// Bit visualization ring particles
const bitParticles = [];

// Simulation state
let step = 0;
let epoch = 0;
let totalMerges = 0;
let simSpeed = 1;
let lastStepTime = 0;
const STEP_INTERVAL = 120; // ms per step
let phase = 'seed'; // seed, converge, decay, reconverge
let phaseTimer = 0;

function log(msg, color) {
  const el = document.getElementById('event-log');
  const entry = document.createElement('div');
  entry.className = 'entry';
  entry.innerHTML = `<span style="color:${color || '#6a6a8a'}">${msg}</span>`;
  el.insertBefore(entry, el.firstChild);
  while (el.children.length > 20) el.removeChild(el.lastChild);
}

function showPhase(text) {
  const el = document.getElementById('phase-label');
  el.textContent = text;
  el.style.opacity = 1;
  setTimeout(() => { el.style.opacity = 0; }, 2000);
}

function epochFlash() {
  const el = document.getElementById('epoch-flash');
  el.style.opacity = 0.15;
  setTimeout(() => { el.style.opacity = 0; }, 300);
}

function simulationStep() {
  step++;

  // Seed phase: each node gets a few random bits
  if (step % 3 === 0) {
    const seeder = Math.floor(Math.random() * NUM_NODES);
    nodes[seeder].seed(1 + Math.floor(Math.random() * 2));
  }

  // Merge phase: nearby nodes exchange
  const i = Math.floor(Math.random() * NUM_NODES);
  const jOffset = 1 + Math.floor(Math.random() * CONTACT_RANGE);
  const j1 = (i + jOffset) % NUM_NODES;
  const j2 = (i - jOffset + NUM_NODES) % NUM_NODES;
  const j = Math.random() < 0.5 ? j1 : j2;

  const delta = nodes[i].merge(nodes[j]);
  if (delta > 0) {
    totalMerges++;
    nodes[i].triggerPulse();
    beams.push(new Beam(nodes[j], nodes[i]));

    // Spawn bit particles
    for (let k = 0; k < Math.min(delta, 5); k++) {
      const angle = Math.random() * Math.PI * 2;
      bitParticles.push({
        x: nodes[i].x + Math.cos(angle) * 30,
        y: nodes[i].y + Math.sin(angle) * 30,
        vx: Math.cos(angle) * (1 + Math.random()),
        vy: Math.sin(angle) * (1 + Math.random()),
        life: 1,
        color: ZONE_COLORS[nodes[i].zone]
      });
    }

    if (delta > 3) {
      log(`NODE ${i} ← NODE ${j}  Δ${delta} bits`, ZONE_COLORS[nodes[i].zone]);
    }
  }

  // Also merge the reverse sometimes
  if (Math.random() < 0.5) {
    const delta2 = nodes[j].merge(nodes[i]);
    if (delta2 > 0) {
      totalMerges++;
      nodes[j].triggerPulse();
      beams.push(new Beam(nodes[i], nodes[j]));
    }
  }

  // Epoch decay
  if (step > 0 && step % 300 === 0) {
    epoch++;
    epochFlash();
    showPhase('EPOCH DECAY');
    log(`━━━ EPOCH ${epoch} DECAY ━━━`, '#e83');
    nodes.forEach(n => n.decay());
  }

  // Zone change logging
  nodes.forEach(n => {
    const oldZone = n.zone;
    n.updateSaturation();
    if (n.zone !== oldZone && n.zone > oldZone) {
      log(`NODE ${n.id} → ${ZONE_NAMES[n.zone]}  sat=${(n.saturation * 100).toFixed(1)}%`, ZONE_COLORS[n.zone]);
    }
  });

  // Update stats
  const sats = nodes.map(n => n.saturation);
  const avgSat = sats.reduce((a, b) => a + b, 0) / NUM_NODES;
  const variance = sats.reduce((a, s) => a + (s - avgSat) ** 2, 0) / NUM_NODES;

  document.getElementById('s-epoch').textContent = epoch;
  document.getElementById('s-step').textContent = step;
  document.getElementById('s-merges').textContent = totalMerges;
  document.getElementById('s-var').textContent = variance.toFixed(6);
  document.getElementById('s-sat').textContent = (avgSat * 100).toFixed(2) + '%';
}

// --- Drawing ---
function drawStars(t) {
  stars.forEach(s => {
    s.twinkle += s.speed;
    const alpha = 0.3 + Math.sin(s.twinkle) * 0.2;
    ctx.fillStyle = `rgba(180, 180, 220, ${alpha})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  });
}

function drawConnections() {
  for (let i = 0; i < NUM_NODES; i++) {
    for (let d = 1; d <= CONTACT_RANGE; d++) {
      const j = (i + d) % NUM_NODES;
      const alpha = 0.04 + 0.02 * (CONTACT_RANGE - d);
      ctx.beginPath();
      ctx.moveTo(nodes[i].x, nodes[i].y);
      ctx.lineTo(nodes[j].x, nodes[j].y);
      ctx.strokeStyle = `rgba(100, 110, 180, ${alpha})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }
}

function drawBeams() {
  beams.forEach(b => {
    b.update();
    const dx = b.to.x - b.from.x;
    const dy = b.to.y - b.from.y;
    const len = Math.sqrt(dx * dx + dy * dy);
    const nx = -dy / len;
    const ny = dx / len;

    b.particles.forEach(p => {
      const t = Math.max(0, Math.min(1, b.progress - p.offset));
      if (t <= 0) return;
      const px = b.from.x + dx * t + nx * p.perpOffset;
      const py = b.from.y + dy * t + ny * p.perpOffset;
      const alpha = p.alpha * (1 - b.progress) * 1.5;
      if (alpha <= 0) return;

      ctx.beginPath();
      ctx.arc(px, py, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(140, 160, 255, ${alpha})`;
      ctx.fill();
    });

    // Main beam line
    const beamAlpha = Math.max(0, (1 - b.progress) * 0.4);
    const t1 = Math.max(0, b.progress - 0.2);
    const t2 = Math.min(1, b.progress);
    ctx.beginPath();
    ctx.moveTo(b.from.x + dx * t1, b.from.y + dy * t1);
    ctx.lineTo(b.from.x + dx * t2, b.from.y + dy * t2);
    ctx.strokeStyle = `rgba(140, 160, 255, ${beamAlpha})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  });

  // Remove dead beams
  for (let i = beams.length - 1; i >= 0; i--) {
    if (!beams[i].alive) beams.splice(i, 1);
  }
}

function drawBitArray(node) {
  const cols = 16;
  const rows = BITS / cols;
  const cellSize = 3;
  const gap = 0.5;
  const totalW = cols * (cellSize + gap);
  const totalH = rows * (cellSize + gap);
  const startX = node.x - totalW / 2;
  const startY = node.y + node.radius + 8;

  for (let i = 0; i < BITS; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const bx = startX + col * (cellSize + gap);
    const by = startY + row * (cellSize + gap);

    if (node.bits[i]) {
      const zoneColor = ZONE_COLORS[node.zone];
      ctx.fillStyle = zoneColor;
      ctx.globalAlpha = 0.7;
    } else {
      ctx.fillStyle = '#1a1a2e';
      ctx.globalAlpha = 0.3;
    }
    ctx.fillRect(bx, by, cellSize, cellSize);
  }
  ctx.globalAlpha = 1;
}

function drawNode(node, t) {
  const zoneColor = ZONE_COLORS[node.zone];

  // Outer glow
  if (node.glowIntensity > 0.01) {
    const grad = ctx.createRadialGradient(node.x, node.y, node.radius, node.x, node.y, node.radius * 3);
    grad.addColorStop(0, `rgba(140, 160, 255, ${node.glowIntensity * 0.3})`);
    grad.addColorStop(1, 'rgba(140, 160, 255, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(node.x, node.y, node.radius * 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Pulse ring
  if (node.pulseAlpha > 0.01) {
    node.pulseRadius += 1.5;
    ctx.beginPath();
    ctx.arc(node.x, node.y, node.pulseRadius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(140, 160, 255, ${node.pulseAlpha * 0.5})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Saturation ring (fills clockwise based on saturation)
  ctx.beginPath();
  ctx.arc(node.x, node.y, node.radius + 4, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * node.saturation);
  ctx.strokeStyle = zoneColor;
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Background ring
  ctx.beginPath();
  ctx.arc(node.x, node.y, node.radius + 4, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(40, 40, 60, 0.5)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Node body
  const bodyGrad = ctx.createRadialGradient(node.x - 5, node.y - 5, 2, node.x, node.y, node.radius);
  bodyGrad.addColorStop(0, '#2a2a4a');
  bodyGrad.addColorStop(1, '#151525');
  ctx.beginPath();
  ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
  ctx.fillStyle = bodyGrad;
  ctx.fill();
  ctx.strokeStyle = `rgba(${hexToRgb(zoneColor)}, 0.4)`;
  ctx.lineWidth = 1;
  ctx.stroke();

  // Node ID
  ctx.fillStyle = '#888';
  ctx.font = '10px Courier New';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(`N${node.id}`, node.x, node.y - 14);

  // Saturation %
  ctx.fillStyle = zoneColor;
  ctx.font = 'bold 11px Courier New';
  ctx.textBaseline = 'middle';
  ctx.fillText(`${(node.saturation * 100).toFixed(1)}%`, node.x, node.y + 2);

  // Bit array visualization
  drawBitArray(node);
}

function drawBitParticles() {
  for (let i = bitParticles.length - 1; i >= 0; i--) {
    const p = bitParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life -= 0.015;
    if (p.life <= 0) { bitParticles.splice(i, 1); continue; }

    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${hexToRgb(p.color)}, ${p.life * 0.6})`;
    ctx.fill();
  }
}

function drawCenterInfo(t) {
  // Faint convergence indicator in center
  const sats = nodes.map(n => n.saturation);
  const avgSat = sats.reduce((a, b) => a + b, 0) / NUM_NODES;
  const variance = sats.reduce((a, s) => a + (s - avgSat) ** 2, 0) / NUM_NODES;
  const convergence = Math.max(0, 1 - variance * 200);

  const cGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 60);
  cGrad.addColorStop(0, `rgba(100, 120, 200, ${convergence * 0.08})`);
  cGrad.addColorStop(1, 'rgba(100, 120, 200, 0)');
  ctx.fillStyle = cGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, 60, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = `rgba(100, 120, 200, ${0.15 + convergence * 0.25})`;
  ctx.font = '10px Courier New';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('CONVERGENCE', cx, cy - 8);
  ctx.font = 'bold 14px Courier New';
  ctx.fillText(`${(convergence * 100).toFixed(1)}%`, cx, cy + 8);
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16) || parseInt(hex.slice(1, 2), 16) * 17;
  const g = parseInt(hex.slice(3, 5), 16) || parseInt(hex.slice(2, 3), 16) * 17;
  const b = parseInt(hex.slice(5, 7), 16) || parseInt(hex.slice(3, 4), 16) * 17;
  // Handle shorthand like #4a9
  if (hex.length === 4) {
    return `${parseInt(hex[1]+hex[1], 16)}, ${parseInt(hex[2]+hex[2], 16)}, ${parseInt(hex[3]+hex[3], 16)}`;
  }
  return `${r}, ${g}, ${b}`;
}

// --- Main loop ---
let lastTime = 0;
let stepAccum = 0;

function loop(time) {
  const dt = time - lastTime;
  lastTime = time;
  stepAccum += dt;

  // Run simulation steps
  while (stepAccum >= STEP_INTERVAL) {
    simulationStep();
    stepAccum -= STEP_INTERVAL;
  }

  // Clear
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  // Subtle vignette
  const vignette = ctx.createRadialGradient(cx, cy, Math.min(W, H) * 0.3, cx, cy, Math.max(W, H) * 0.7);
  vignette.addColorStop(0, 'rgba(10, 10, 15, 0)');
  vignette.addColorStop(1, 'rgba(0, 0, 0, 0.4)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);

  drawStars(time);
  drawConnections();
  drawBeams();
  drawCenterInfo(time);
  nodes.forEach(n => n.update());
  nodes.forEach(n => drawNode(n, time));
  drawBitParticles();

  requestAnimationFrame(loop);
}

// Handle window resize — reposition nodes
window.addEventListener('resize', () => {
  resize();
  const ncx = W / 2, ncy = H / 2;
  const nr = Math.min(W, H) * 0.28;
  nodes.forEach((n, i) => {
    const a = (i / NUM_NODES) * Math.PI * 2 - Math.PI / 2;
    n.baseX = ncx + Math.cos(a) * nr;
    n.baseY = ncy + Math.sin(a) * nr;
  });
});

// Start
requestAnimationFrame(loop);
</script>
</body>
</html>
